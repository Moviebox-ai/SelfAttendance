# AndroidIDE UTF-8 settings
systemProp.user.language=en
systemProp.user.country=US

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip

zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists

# JVM settings
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -Duser.language=en -Duser.country=US

# AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Fix compileSdk warning
android.suppressUnsupportedCompileSdk=35

# Encoding fixes
systemProp.sun.jnu.encoding=UTF-8
systemProp.file.encoding=UTF-8